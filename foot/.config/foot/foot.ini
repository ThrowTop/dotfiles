[main]

shell=fish
title=foot
font=JetBrains Mono Nerd Font:size=12
letter-spacing=0
dpi-aware=no
pad=10x10
bold-text-in-bright=no
gamma-correct-blending=no

[scrollback]
lines = 10000

[colors-dark]
background = 101010
foreground = e7e1e5
alpha=0.5

selection-background = f4b7bb
selection-foreground = 4c2529


[cursor]
style = beam
blink = yes
blink-rate = 500
beam-thickness = 1.5

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
search-start=Control+f

[search-bindings]
cancel=Escape
find-prev=Shift+F3
find-next=F3 Control+G
