background {
    monitor =
    path = /home/throw/custom/media/backgrounds/MODER-CURVE-WALLPAPERS-HEROSCREEN-3211322.png
    blur_passes = 2
    blur_size = 7
    brightness = 0.6
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    outer_color = rgb(255, 255, 255)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgb(255, 255, 255)
    fade_on_empty = true
    placeholder_text = <i>Password</i>
    hide_input = false
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 0.9)
    font_size = 72
    font_family = JetBrains Mono Nerd Font
    position = 0, 200
    halign = center
    valign = center
}
