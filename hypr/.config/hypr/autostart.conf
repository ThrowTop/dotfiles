# =====================================================================
# AUTOSTART — autostart.conf
# Programs launched once on Hyprland startup
# =====================================================================

# Shell / status bar
exec-once = vicinae server

# Force dark mode for libadwaita (GTK4) apps — GTK_THEME alone doesn't affect these
exec-once = gsettings set org.gnome.desktop.interface color-scheme prefer-dark

# Terminal server (foot)
exec-once = foot --server
exec-once = qs -c noctalia-shell

# Wallpaper
exec-once = hyprpaper

# Lock screen on boot
exec-once = hyprlock

# Idle management — screen off after 5min, suspend after 10min
exec-once = hypridle

# Bitwarden — launched silently; window rule sends it to special:bitwarden
# Toggle visibility with Super+P

# echo "$USER ALL=(ALL) NOPASSWD: /usr/bin/tee /sys/class/power_supply/BAT1/charge_control_end_threshold" | sudo tee /etc/sudoers.d/battery-threshold

exec-once = echo 85 | sudo tee /sys/class/power_supply/BAT1/charge_control_end_threshold

# Unmute speaker and set to 100% (resets to MM on reboot)
exec-once = amixer -c 0 sset Speaker 100% unmute
