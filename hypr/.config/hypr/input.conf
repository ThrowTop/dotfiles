# =====================================================================
# INPUT — input.conf
# Keyboard layouts, mouse, touchpad, gestures, per-device overrides
# =====================================================================

# -------------------------
# KEYBOARD & MOUSE
# https://wiki.hypr.land/Configuring/Variables/#input
# -------------------------
input {
    # Keyboard layouts — cycle with Win+Space
    kb_layout  = us,se
    kb_variant =
    kb_model   =
    kb_options = grp:win_space_toggle

    numlock_by_default = true
    mouse_refocus      = false

    # Focus follows mouse (1 = focus on hover, 2 = also raise window)
    follow_mouse = 1

    # Mouse sensitivity and acceleration
    sensitivity  = -0.3      # -1.0 to 1.0; negative = slower
    accel_profile = flat     # flat = no acceleration curve

    # Middle-click scrolling — hold MMB and move mouse to scroll
    scroll_method     = on_button_down
    scroll_button     = 274        # 274 = BTN_MIDDLE (middle mouse button)
    scroll_button_lock = false     # hold to scroll, release to stop

    # -------------------------
    # TOUCHPAD
    # -------------------------
    touchpad {
        natural_scroll      = true
        tap-to-click        = true
        drag_lock           = false
        disable_while_typing = true
        scroll_factor       = 0.5
    }
}

# -------------------------
# GESTURES
# https://wiki.hypr.land/Configuring/Gestures/
# -------------------------
gesture = 3, horizontal, workspace   # 3-finger swipe left/right → switch workspace

# -------------------------
# PER-DEVICE OVERRIDES
# https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs
# Use `hyprctl devices` to list device names
# -------------------------
device {
    name         = znt0001:00-14e5:650e-touchpad
    sensitivity  = 0
    accel_profile = adaptive
}
