# =====================================================================
# WINDOW & LAYER RULES — rules.conf
# Hyprland 0.54 new windowrule{} block syntax
# https://wiki.hypr.land/Configuring/Window-Rules/
# https://wiki.hypr.land/Configuring/Workspace-Rules/
# =====================================================================


# =====================================================================
# LAYER RULES
# =====================================================================

layerrule {
    name = vicinae-blur
    blur       = on
    ignore_alpha = 0
    match:namespace = vicinae
}

layerrule {
    name = vicinae-no-animation
    no_anim = on
    match:namespace = vicinae
}


# =====================================================================
# GLOBAL WINDOW RULES
# =====================================================================

windowrule {
    # Suppress maximize requests from all apps
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix XWayland drag ghost windows stealing focus
    name = fix-xwayland-drags
    match:class      = ^$
    match:title      = ^$
    match:xwayland   = true
    match:float      = true
    match:fullscreen = false
    match:pin        = false

    no_focus = true
}

windowrule {
    # hyprland-run popup — bottom-left floating
    name = move-hyprland-run
    match:class = hyprland-run

    float = true
    move  = 20 monitor_h-120
}


# =====================================================================
# BITWARDEN — floating scratchpad, top-right corner
# Toggled with Super+P (see binds.conf)
# =====================================================================

windowrule {
    name = bitwarden-scratchpad
    match:class = ^(Bitwarden)$

    float     = true
    size      = 400 600
    # Position: right edge minus window width minus margin, and 40px from top
    move      = 100%-420 40
    workspace = special:bitwarden silent

}


# =====================================================================
# PER-APP RULES
# =====================================================================

# File manager
windowrule {
    name = thunar-float
    match:class = ^(thunar|Thunar)$
    match:title  = ^(File Operation Progress).*$

    float = true
    size  = 600 300
    center = true
}

# Picture-in-picture
windowrule {
    name = pip-float
    match:title = ^(Picture-in-Picture)$

    float     = true
    pin       = true
    keep_aspect_ratio = true
    size      = 640 360
    move      = 100%-660 100%-380
}



windowrule = workspace 9 silent, match:class ^(rustdesk)$


# Steam
windowrule {
    name = steam-float
    match:class = ^(steam)$
    match:title  = ^(Steam Settings|Friends List).*$

    float = true
}

# pavucontrol / volume control
windowrule {
    name = pavucontrol-float
    match:class = ^(pavucontrol)$

    float  = true
    size   = 800 500
    center = true
}

# Calculator
windowrule {
    name = calculator-float
    match:class = ^(gnome-calculator|qalculate-gtk|speedcrunch)$

    float  = true
    center = true
}

# Screen sharing indicator — keep it out of the way
windowrule {
    name = screenshare-indicator
    match:title = ^(Firefox — Sharing Indicator|.*Sharing Indicator.*)$

    float    = true
    move     = 0 0
    pin      = true
    no_focus = true
}


