general {
    after_sleep_cmd = hyprctl dispatch dpms on
}

# On battery: turn off screen after 2 minutes
listener {
    timeout = 120
    on-timeout = bash -c 'grep -q 1 /sys/class/power_supply/ADP1/online || hyprctl dispatch dpms off'
    on-resume  = hyprctl dispatch dpms on
}

# Plugged in: turn off screen after 10 minutes
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# Suspend after 10 minutes on battery, skip if plugged in
listener {
    timeout = 600
    on-timeout = bash -c 'grep -q 1 /sys/class/power_supply/ADP1/online || systemctl suspend'
}
