general {
    lock_cmd = hyprlock
    before_sleep_cmd = hyprlock
    after_sleep_cmd = hyprctl dispatch 'hl.dpms(true)'
    ignore_dbus_inhibit = false
}

# Screen off after 5 minutes (battery and AC)
listener {
    timeout = 300
    on-timeout = hyprctl dispatch 'hl.dpms(true)'
    on-resume = hyprctl dispatch 'hl.dpms(false)'
}

# Suspend after 10 minutes on battery
listener {
    timeout = 600
    on-timeout = grep -q "Discharging" /sys/class/power_supply/BAT1/status && systemctl suspend
}

# Suspend after 30 minutes on AC (battery suspends at 10min, never reaches this)
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
