# Shell
shell fish
confirm_os_window_close 0
paste_actions no-op

# Font
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        12.0

# Padding
window_padding_width 0

# Opacity
background_opacity 0.5

# Scrollback
scrollback_lines 10000

# Cursor
cursor_shape           beam
cursor_beam_thickness  1.5
cursor_blink_interval  0.5

# Colors
foreground            #e7e1e5
background            #101010
selection_foreground  #4c2529
selection_background  #f4b7bb

# Black
color0  #242424
color8  #616161
# Red
color1  #f62b5a
color9  #ff4d51
# Green
color2  #47b413
color10 #35d450
# Yellow
color3  #e3c401
color11 #e9e836
# Blue
color4  #24acd4
color12 #5dc5f8
# Magenta
color5  #f2affd
color13 #feabf2
# Cyan
color6  #13c299
color14 #24dfc4
# White
color7  #e6e6e6
color15 #ffffff

# Tab bar
tab_bar_edge              bottom
tab_bar_style             powerline
tab_powerline_style       slanted
tab_title_template        {index}: {title}
active_tab_foreground     #101010
active_tab_background     #89b4fa
active_tab_font_style     bold
inactive_tab_foreground   #a6adc8
inactive_tab_background   #1a1a1a
inactive_tab_font_style   normal
tab_bar_background        #101010

# Tab switching (Alt+1–9)
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

# Tab management
map alt+t new_tab_with_cwd
map alt+w close_tab
map alt+, previous_tab
map alt+. next_tab


